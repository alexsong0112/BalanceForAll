<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Are You Equal? - Balance For All</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        header {
            background-color: #6c63ff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #4b47c7;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 30px;
            text-align: center;
        }

        .section {
            background: white;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 80%;
        }

        footer {
            background-color: #6c63ff;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>Balance For All</h1>
    <p>Promoting Gender Equality and Inclusion</p>
</header>

<div class="container">

    <div class="section">
        <h2>Are You Equal?</h2>

        <p>
        Take this quiz to test your knowledge about gender equality.
        Your score will appear at the top after you submit.
        </p>

        <br>

        <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLSfInPOzpmUw1euTzuTQPWIcIBqnpRrBJmI4nLg3UAh2PhjOjg/viewform?embedded=true"
            width="100%"
            height="900">
        </iframe>

    </div>

</div>

<footer>
    <p>© 2026 Balance For All</p>
</footer>

</body>
</html>
